version: "3.8"

services:
  runner-mongo:
    image: mongo:7
    container_name: azure-ai-runner-mongo
    restart: unless-stopped
    ports:
      - "27027:27017"
    volumes:
      - runner_mongo_data:/data/db
    networks:
      - runner-network

  runner-redis:
    image: redis:7-alpine
    container_name: azure-ai-runner-redis
    restart: unless-stopped
    ports:
      - "6389:6379"
    volumes:
      - runner_redis_data:/data
    networks:
      - runner-network

  # Runner 应用（预装 FRPC，直接连接 frps 建立穿透）
  runner-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: azure-ai-runner-app
    restart: unless-stopped
    expose:
      - "4310"
    environment:
      - NODE_ENV=production
    volumes:
      - runner_data:/app/runner.data
    networks:
      - runner-network
    depends_on:
      - runner-mongo
      - runner-redis

  # Runner Caddy: 接收 frpc 穿透流量 → 转发到 runner-app:4310
  # 对外暴露 :80（frpc 本地端口指向此处）
  runner-caddy:
    image: caddy:2-alpine
    container_name: azure-ai-runner-caddy
    restart: unless-stopped
    ports:
      - "80:80"        # frpc localPort 指向此端口
      - "2019:2019"    # Caddy admin API    environment:
      # Docker 模式： runner-app:4310；宿主机模式： host.docker.internal:4310
      RUNNER_UPSTREAM: ${RUNNER_UPSTREAM:-runner-app:4310}
    extra_hosts:
      - "host.docker.internal:host-gateway"    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - runner_caddy_data:/data
    networks:
      - runner-network
    depends_on:
      - runner-app

volumes:
  runner_mongo_data:
    driver: local
  runner_redis_data:
    driver: local
  runner_caddy_data:
    driver: local
  runner_data:
    driver: local

networks:
  runner-network:
    driver: bridge

