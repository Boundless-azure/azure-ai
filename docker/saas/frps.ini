[common]
# FRP Server 配置

# 基础配置
bind_port = 7000
bind_udp_port = 7001
udp_packet_size = 1500

# HTTP/HTTPS 配置
vhost_http_port = 80
vhost_https_port = 443

# 认证
auth_method = token
token = ${FRP_AUTH_TOKEN:-change_me_in_production}

# 日志
log_file = ./logs/frps.log
log_level = info
log_max_days = 3

# 连接池
max_pool_count = 100
max_bind_port = 65535
