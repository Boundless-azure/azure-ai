version: "3.8"

services:
  runner-mongo:
    image: mongo:7
    container_name: azure-ai-runner-mongo
    restart: unless-stopped
    ports:
      - "27027:27017"
    volumes:
      - runner_mongo_data:/data/db
    networks:
      - runner-network

  runner-redis:
    image: redis:7-alpine
    container_name: azure-ai-runner-redis
    restart: unless-stopped
    ports:
      - "6389:6379"
    volumes:
      - runner_redis_data:/data
    networks:
      - runner-network

volumes:
  runner_mongo_data:
    driver: local
  runner_redis_data:
    driver: local

networks:
  runner-network:
    driver: bridge
