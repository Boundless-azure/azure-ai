version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: azure-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: azure_ai_dev
      POSTGRES_USER: azure_ai_user
      POSTGRES_PASSWORD: azure_ai_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - azure-ai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: azure-ai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - azure-ai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # SaaS Caddy: HTTPS 终止 + 反代到宿主机 NestJS (host.docker.internal:3000)
  saas-caddy:
    image: caddy:2-alpine
    container_name: azure-ai-saas-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/saas/Caddyfile:/etc/caddy/Caddyfile:ro
      - saas_caddy_data:/data
    networks:
      - azure-ai-network

  # SaaS FRP Server: 端口范围 20000-30000, HTTP plugin 鉴权
  saas-frp:
    image: snowdreamtech/frps:0.61.1
    container_name: azure-ai-saas-frp
    restart: unless-stopped
    environment:
      # 需与 frp_nodes.token 保持一致，生产环境必须覆盖
      FRP_AUTH_TOKEN: ${FRP_AUTH_TOKEN:-frps-default-token-change-in-production}
    ports:
      - "7000:7000"       # frpc 连接端口
      - "7500:7500"       # frps admin webUI
      - "20000-20099:20000-20099"  # runner 穿透端口（dev 用 100 个即可）
    volumes:
      - ./docker/saas/frps.toml:/etc/frp/frps.toml:ro
      - saas_frp_logs:/var/log/frp
    command: ["-c", "/etc/frp/frps.toml"]
    # 允许容器访问宿主机（Linux 需要 host-gateway）
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - azure-ai-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  saas_caddy_data:
    driver: local
  saas_frp_logs:
    driver: local

networks:
  azure-ai-network:
    driver: bridge

